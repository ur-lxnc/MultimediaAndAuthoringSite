  <style>
    :root {
      --navy-deepest: #020b18;
      --navy-deep:    #040f1e;
      --navy-mid:     #071628;
      --navy-card:    #0a1e38;
      --navy-border:  #102845;
      --navy-light:   #163460;
      --accent:       #2e8fe8;
      --accent-glow:  #3fa0ff;
      --accent-soft:  rgba(46,143,232,0.12);
      --accent-line:  rgba(46,143,232,0.4);
      --gold:         #c8a96e;
      --text-primary: #e8edf5;
      --text-secondary:#8fa8c8;
      --text-muted:   #4a6585;
      --white:        #ffffff;
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'DM Sans', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--navy-deepest); color: var(--text-primary); font-family: var(--font-body); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 3rem; height: 64px;
      background: rgba(2,11,24,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--navy-border);
    }
    .nav-logo { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-links a {
      text-decoration: none; color: var(--text-secondary);
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.5rem 1rem; border-radius: 4px; transition: color 0.2s, background 0.2s; position: relative;
    }
    .nav-links a:hover { color: var(--white); background: var(--accent-soft); }

    .page-header {
      padding: 9rem 2rem 5rem;
      background: linear-gradient(180deg, var(--navy-deep) 0%, var(--navy-mid) 100%);
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 20% 50%, rgba(46,143,232,0.07) 0%, transparent 70%);
    }
    .header-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .breadcrumb {
      font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.15em;
      color: var(--text-muted); margin-bottom: 1.25rem;
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb span { margin: 0 0.4rem; }
    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700; color: var(--white); line-height: 1.0; margin-bottom: 0.75rem;
    }
    .page-title span { color: var(--accent); }
    .page-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem;
    }
    .page-desc { color: var(--text-secondary); font-size: 1rem; line-height: 1.8; max-width: 680px; margin-top: 0.75rem; }

    main { max-width: 1100px; margin: 0 auto; padding: 5rem 2rem 6rem; }

    .section-head { margin-bottom: 2.5rem; }
